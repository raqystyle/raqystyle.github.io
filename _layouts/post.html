---
layout: default
---

<header class="post-header">
  <h1 class="post-title">{{ page.title }}</h1>
  <small class="post-meta">{{ page.date | date: "%b %-d, %Y" }}{% if page.author %} • {{ page.author }}{% endif %}{% if page.meta %} • {{ page.meta }}{% endif %}</small>
</header>

<article class="post-content">
  {{ content }}
</article>

<footer class="post-footer">
{% if jekyll.environment == "production" %}
  {% include disqus.html %}
{% endif %}
</footer>
